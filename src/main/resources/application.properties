# SQL Server connection settings
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=nic_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JWT signing secret for X-Auth-Token values
app.auth.jwt.secret=${AUTH_TOKEN_SECRET}

# Comma-separated list of browser origins allowed to call /api/** endpoints
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
