# SQL Server connection settings
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=nic_db;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JWT signing secret for X-Auth-Token values
app.auth.jwt.secret=${AUTH_TOKEN_SECRET}

# Comma-separated list of browser origins allowed to call /api/** endpoints
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=${UPLOAD_DIR:${user.home}/nic-secure-uploads}

# Email/SMS notifications are opt-in. Configure SMTP and SMS gateway values in the environment.
app.notifications.email.enabled=${NOTIFICATIONS_EMAIL_ENABLED:false}
app.notifications.email.from=${NOTIFICATIONS_EMAIL_FROM:${spring.mail.username:no-reply@nic.local}}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.notifications.sms.enabled=${NOTIFICATIONS_SMS_ENABLED:false}
app.notifications.sms.gateway-url=${SMS_GATEWAY_URL:}
app.notifications.sms.api-token=${SMS_API_TOKEN:}

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
